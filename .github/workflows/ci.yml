name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Color guard (no new raw hex; design-system token-pure)
        run: npm run lint:colors

      - name: Test
        run: npm run test

      - name: Validate Supabase migrations
        run: npm run db:validate
